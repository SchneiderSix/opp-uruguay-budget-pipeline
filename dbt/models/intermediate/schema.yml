version: 2

models:
  - name: int_budget_unified
    description: "All budget data sources unioned into a consistent schema"
    columns:
      - name: budget_id
        description: "Surrogate key for budget line items (not unique at this grain)"
        tests:
          - not_null
      - name: fiscal_year
        tests:
          - not_null

  - name: int_budget_enriched
    description: "Unified budget data enriched with YoY change and execution rate"
    columns:
      - name: budget_id
        tests:
          - not_null
